version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/lazypostman
    binary: lazypostman
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: mitss1
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/mitss1/lazypostman"
    description: "A terminal UI for Postman collections"
    license: "MIT"
    install: |
      bin.install "lazypostman"
    test: |
      system "#{bin}/lazypostman", "--version"
